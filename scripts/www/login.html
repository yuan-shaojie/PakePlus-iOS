<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script>
    (function() {
        var _store = {};
        ['localStorage','sessionStorage'].forEach(function(name) {
            try { var t = window[name]; t.setItem('_x', '1'); t.removeItem('_x'); } catch(e) {
                Object.defineProperty(window, name, { value: {
                    getItem: function(k) { return _store[k] || null; },
                    setItem: function(k, v) { _store[k] = String(v); },
                    removeItem: function(k) { delete _store[k]; },
                    clear: function() { _store = {}; },
                    get length() { return Object.keys(_store).length; },
                    key: function(i) { return Object.keys(_store)[i] || null; }
                }, writable: false, configurable: false });
            }
        });
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小龙虾 AI - 登录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🦞</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-tertiary: #1a1a24;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --accent-cyan: #00f0ff;
            --accent-purple: #8b5cf6;
            --border-color: #2a2a3a;
            --danger: #ff4d6a;
            --success: #00e676;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.top { top: -200px; left: 50%; transform: translateX(-50%); background: var(--accent-cyan); }
        .bg-glow.bottom { bottom: -200px; left: 30%; background: var(--accent-purple); }

        .login-container {
            position: relative;
            z-index: 1;
            width: 400px;
            max-width: 90vw;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(20px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.25s;
        }

        .form-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }

        .form-input::placeholder {
            color: #555;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.25);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            text-align: center;
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-msg.show {
            opacity: 1;
        }

        .remember-row {
            display: flex;
            align-items: center;
            margin: 4px 0 16px 0;
            font-size: 13px;
            color: var(--text-secondary);
            user-select: none;
        }

        .remember-row input[type="checkbox"] {
            display: none;
        }

        .remember-check {
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--border-color);
            border-radius: 4px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .remember-check.checked {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .remember-check svg {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .remember-check.checked svg {
            opacity: 1;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow top"></div>
    <div class="bg-glow bottom"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <svg viewBox="0 0 80 80" width="80" height="80">
                    <defs>
                        <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00f0ff"/>
                            <stop offset="100%" style="stop-color:#8b5cf6"/>
                        </linearGradient>
                    </defs>
                    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
                    <circle cx="28" cy="30" r="6" fill="#00f0ff" opacity="0.8"/>
                    <circle cx="52" cy="30" r="6" fill="#00f0ff" opacity="0.8"/>
                    <path d="M22 52 Q40 62 58 52" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="40" y1="38" x2="40" y2="48" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="40" cy="36" r="2.5" fill="#00f0ff"/>
                </svg>
            </div>
            <h1 class="login-title">小龙虾 AI</h1>
            <p class="login-subtitle">中继网关 · 安全接入</p>
        </div>

        <div class="login-card">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">账号</label>
                    <input class="form-input" type="text" id="username" placeholder="请输入账号" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input class="form-input" type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <div class="remember-row" id="rememberRow">
                    <div class="remember-check" id="rememberCheck">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span>记住密码</span>
                </div>
                <button class="btn-login" type="submit" id="btnLogin">
                    <span id="btnText">登 录</span>
                </button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>

        <div class="login-footer">
            小龙虾 Chat Relay · v1.0
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        (function() {
            var form = document.getElementById('loginForm');
            var btnLogin = document.getElementById('btnLogin');
            var btnText = document.getElementById('btnText');
            var errorMsg = document.getElementById('errorMsg');
            var usernameInput = document.getElementById('username');
            var passwordInput = document.getElementById('password');
            var rememberCheck = document.getElementById('rememberCheck');
            var rememberRow = document.getElementById('rememberRow');
            var isRemembered = false;

            var saved = readSaved();
            if (saved) {
                usernameInput.value = saved.username;
                passwordInput.value = saved.password;
                rememberCheck.classList.add('checked');
                isRemembered = true;
            }

            rememberRow.addEventListener('click', function() {
                isRemembered = !isRemembered;
                if (isRemembered) {
                    rememberCheck.classList.add('checked');
                } else {
                    rememberCheck.classList.remove('checked');
                }
            });

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                var username = usernameInput.value.trim();
                var password = passwordInput.value;

                if (!username || !password) {
                    showError('请输入账号和密码');
                    return;
                }

                btnLogin.disabled = true;
                btnText.innerHTML = '<span class="spinner"></span>登录中...';
                errorMsg.classList.remove('show');

                // 先确保 API 模块初始化完成
                if (!API._initialized) {
                    API.init(function() {
                        doLogin(username, password, isRemembered);
                    });
                } else {
                    doLogin(username, password, isRemembered);
                }
            });

            function doLogin(username, password, isRemembered) {
                API.login(username, password)
                .then(function(data) {
                    if (data.error) {
                        showError(data.error);
                        btnLogin.disabled = false;
                        btnText.textContent = '登 录';
                        return;
                    }

                    if (data.token) {
                        if (isRemembered) {
                            saveCredentials(username, password);
                        } else {
                            clearSaved();
                        }
                        localStorage.setItem('xlx_auth_token', data.token);
                        window.location.href = '/';
                    }
                })
                .catch(function(err) {
                    showError('网络错误，请重试');
                    btnLogin.disabled = false;
                    btnText.textContent = '登 录';
                });
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.add('show');
                setTimeout(function() {
                    errorMsg.classList.remove('show');
                }, 3000);
            }

            function saveCredentials(username, password) {
                var data = btoa(unescape(encodeURIComponent(username + ':' + password)));
                localStorage.setItem('xlx_saved_cred', data);
            }

            function readSaved() {
                var data = localStorage.getItem('xlx_saved_cred');
                if (!data) return null;
                try {
                    var decoded = decodeURIComponent(escape(atob(data)));
                    var parts = decoded.split(':');
                    if (parts.length >= 2) {
                        return { username: parts[0], password: parts.slice(1).join(':') };
                    }
                } catch(e) {}
                return null;
            }

            function clearSaved() {
                localStorage.removeItem('xlx_saved_cred');
            }

            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        })();
    </script>
</body>
</html>
